<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OshanCart Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #121212;
            --btn-border: #2c2c2c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #ff4757;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* --- Manus Style Animated Background --- */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        /* බොත්තම් පිටුපසින් පෙනෙන චලනය වන ආලෝකය */
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 71, 87, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: moveGlow 15s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-20%, -20%); }
            100% { transform: translate(20%, 20%); }
        }

        .container {
            width: 100%; max-width: 400px; padding: 25px;
            text-align: center; position: relative; z-index: 10;
        }

        /* --- Branding --- */
        .logo-section { margin-bottom: 35px; }
        .logo-img {
            width: 65px; height: 65px; margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255, 71, 87, 0.4));
        }
        h1 { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        p { color: var(--text-dim); font-size: 15px; margin-top: 10px; }

        /* --- Social Buttons (Manus Global Style) --- */
        .social-list { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        
        .btn-social {
            display: flex; align-items: center; justify-content: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--btn-border);
            padding: 14px 24px; border-radius: 14px;
            color: white; font-weight: 500; font-size: 15px;
            cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }

        .btn-social:hover {
            background: #1c1c1c;
            border-color: #444;
            transform: translateY(-2px);
        }

        .btn-social i { width: 30px; font-size: 20px; margin-right: 10px; }

        /* --- Divider --- */
        .divider {
            display: flex; align-items: center; color: #333;
            font-size: 11px; font-weight: 700; margin: 25px 0;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; margin: 0 15px; }

        /* --- Input Fields --- */
        .input-box { margin-bottom: 12px; }
        .input-box input {
            width: 100%; background: #0f0f0f; border: 1px solid #222;
            padding: 15px; border-radius: 12px; color: white;
            box-sizing: border-box; font-size: 14px;
        }
        .input-box input:focus { border-color: var(--accent); outline: none; background: #000; }

        .btn-main {
            width: 100%; background: #ffffff; color: #000000;
            border: none; padding: 16px; border-radius: 14px;
            font-weight: 700; font-size: 16px; cursor: pointer;
            margin-top: 15px; transition: 0.3s;
        }
        .btn-main:hover { background: #e0e0e0; }

        .footer { margin-top: 30px; font-size: 13px; color: var(--text-dim); }
        .footer a { color: white; text-decoration: none; font-weight: 600; }

    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bg-glow"></div>
    </div>

    <div class="container">
        <div class="logo-section">
            <img src="https://oshlababa.com/logo.png" alt="OshanCart" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162499.png'">
            <h1>Welcome to OshanCart</h1>
        </div>

        <div class="social-list">
            <button class="btn-social" id="btnFacebook">
                <i class="fab fa-facebook" style="color: #1877f2;"></i> Continue with Facebook
            </button>
            <button class="btn-social" id="btnGoogle">
                <i class="fab fa-google" style="color: #ffffff;"></i> Continue with Google
            </button>
            <button class="btn-social" id="btnMicrosoft">
                <i class="fab fa-microsoft" style="color: #00a4ef;"></i> Continue with Microsoft
            </button>
            <button class="btn-social" id="btnApple">
                <i class="fab fa-apple"></i> Continue with Apple
            </button>
        </div>

        <div class="divider">OR</div>

        <form id="signupForm">
            <div class="input-box">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <button class="btn-main">Continue with Email</button>
        </form>

        <div class="footer">
            By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
            <p>© 2026 OshanCart Global</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
            authDomain: "oshancart.firebaseapp.com",
            projectId: "oshancart",
            storageBucket: "oshancart.appspot.com",
            messagingSenderId: "686982543488",
            appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Google Sign-In
        document.getElementById('btnGoogle').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                window.location.href = "index.html";
            } catch (error) { alert(error.message); }
        };

        // Facebook Sign-In
        document.getElementById('btnFacebook').onclick = async () => {
            const provider = new FacebookAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                window.location.href = "index.html";
            } catch (error) { alert(error.message); }
        };
    </script>
</body>
</html>
