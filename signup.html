<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OshanCart - Making Global Trading Simple</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --accent-orange: #ff4757;
            --text-gray: #a0a0a0;
            --btn-hover: #252525;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- Animated Background Canvas --- */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.6;
        }

        .container {
            width: 100%; max-width: 420px; padding: 20px;
            text-align: center; z-index: 10;
        }

        /* --- Logo & Branding --- */
        .brand-section { margin-bottom: 30px; }
        .logo-icon {
            width: 70px; height: 70px; margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--accent-orange));
        }
        .brand-section h1 { font-size: 28px; margin: 0; font-weight: 700; }
        .brand-section p { color: var(--text-gray); font-size: 14px; margin-top: 8px; }

        /* --- Social Buttons (Manus Style) --- */
        .social-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        
        .btn-social {
            display: flex; align-items: center;
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 14px 20px; border-radius: 12px;
            color: white; font-weight: 500; font-size: 15px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-social:hover { background: var(--btn-hover); border-color: #555; transform: translateY(-2px); }
        .btn-social i { width: 25px; font-size: 18px; margin-right: 15px; }

        /* --- Divider --- */
        .divider {
            display: flex; align-items: center; color: #444;
            font-size: 12px; margin: 25px 0; text-transform: uppercase; letter-spacing: 1px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; margin: 0 15px; }

        /* --- Form Fields --- */
        .input-group { margin-bottom: 12px; position: relative; }
        .input-group input {
            width: 100%; background: #111; border: 1px solid #222;
            padding: 14px 15px; border-radius: 10px; color: white;
            box-sizing: border-box; font-size: 14px; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-orange); outline: none; background: #000; }

        .btn-primary {
            width: 100%; background: var(--accent-orange); color: white;
            border: none; padding: 15px; border-radius: 12px;
            font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); transition: 0.3s;
        }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.01); }

        .footer-text { margin-top: 25px; color: var(--text-gray); font-size: 13px; }
        .footer-text a { color: white; text-decoration: none; font-weight: 600; }

        /* Mobile View Optimization */
        @media (max-width: 480px) {
            .container { max-width: 100%; }
            .brand-section h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="brand-section">
            <img src="https://oshlababa.com/logo.png" alt="OshanCart" class="logo-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162499.png'">
            <h1>Welcome to OshanCart</h1>
            <p>Making global trading simple for everyone.</p>
        </div>

        <div class="social-container">
            <button class="btn-social" id="btnGoogle">
                <i class="fab fa-google" style="color: #ea4335;"></i> Continue with Google
            </button>
            <button class="btn-social" id="btnFacebook">
                <i class="fab fa-facebook" style="color: #1877f2;"></i> Continue with Facebook
            </button>
            <button class="btn-social" id="btnApple">
                <i class="fab fa-apple"></i> Continue with Apple
            </button>
        </div>

        <div class="divider">or use email</div>

        <form id="signupForm" onsubmit="return false;">
            <div class="input-group">
                <input type="text" id="regName" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Create Password" required>
            </div>
            <button class="btn-primary" id="btnSubmit">Create Account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="login.html">Sign In</a>
            <p style="font-size: 10px; margin-top: 20px; opacity: 0.5;">© 2026 OshanCart Global. All rights reserved.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 71, 87, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas(); createParticles(); animate();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
            authDomain: "oshancart.firebaseapp.com",
            projectId: "oshancart",
            storageBucket: "oshancart.appspot.com",
            messagingSenderId: "686982543488",
            appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnGoogle').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                alert("Welcome " + result.user.displayName);
                window.location.href = "index.html";
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
