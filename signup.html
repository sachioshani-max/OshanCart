<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OshanCart - Global Trading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-orange: #febd69;
            --card-bg: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.12);
            --text-white: #ffffff;
        }

        body, html {
            height: 100%; margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--primary-bg);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; /* Background animation එක සඳහා */
        }

        /* --- Background Animation Effect --- */
        .bg-animation {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

        .circles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
        }

        .circles li {
            position: absolute; display: block; list-style: none;
            width: 20px; height: 20px; background: rgba(254, 189, 105, 0.1);
            animation: animate 25s linear infinite; bottom: -150px;
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* --- Signup Card --- */
        .signup-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 24px;
            width: 90%; max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; color: var(--text-white);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-box { margin-bottom: 25px; }
        .logo-box img { width: 180px; filter: drop-shadow(0 0 10px rgba(254, 189, 105, 0.3)); }

        h2 { font-size: 24px; font-weight: 700; margin: 10px 0; }
        p { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }

        /* --- Social Buttons (Manus Style) --- */
        .social-area { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        
        .btn-social {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 14px; border-radius: 12px;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            background: var(--input-bg); color: white;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            font-size: 15px; text-decoration: none;
        }
        .btn-social:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        .divider {
            display: flex; align-items: center; margin: 25px 0;
            font-size: 12px; color: rgba(255, 255, 255, 0.4);
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); margin: 0 10px; }

        /* --- Input Fields --- */
        .input-box { margin-bottom: 15px; position: relative; }
        .input-box input {
            width: 100%; padding: 14px 15px; border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: white;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        .input-box input:focus { border-color: var(--accent-orange); }

        .btn-create {
            width: 100%; padding: 15px; border-radius: 12px;
            background: var(--accent-orange); color: #131921;
            border: none; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-create:hover { background: #f3a847; transform: scale(1.02); }

        .footer-text { margin-top: 25px; font-size: 14px; opacity: 0.8; }
        .footer-text a { color: var(--accent-orange); text-decoration: none; font-weight: 600; }

        /* Animation Circle positions */
        .circles li:nth-child(1){ left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2){ left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3){ left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
    </style>
</head>
<body>

    <div class="bg-animation">
        <ul class="circles">
            <li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div>

    <div class="signup-container">
        <div class="logo-box">
            <img src="https://oshani-max.github.io/img/oshancart-logo.png" alt="OshanCart" onerror="this.src='https://via.placeholder.com/180x50/131921/febd69?text=OshanCart'">
        </div>

        <h2>Create Account</h2>
        <p>Making global trading simple</p>

        <div class="social-area">
            <button class="btn-social" id="btnGoogle">
                <img src="https://img.icons8.com/color/24/000000/google-logo.png"/> Continue with Google
            </button>
            <button class="btn-social" id="btnFacebook">
                <i class="fab fa-facebook fa-lg" style="color:#1877F2"></i> Continue with Facebook
            </button>
        </div>

        <div class="divider">OR</div>

        <form id="signupForm">
            <div class="input-box">
                <input type="text" id="fullName" placeholder="Full Name" required>
            </div>
            <div class="input-box">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Create Password" required>
            </div>
            <button type="submit" class="btn-create" id="btnSubmit">Create Account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
            authDomain: "oshancart.firebaseapp.com",
            projectId: "oshancart",
            storageBucket: "oshancart.firebasestorage.app",
            messagingSenderId: "686982543488",
            appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Firestore User Save
        async function saveUser(user, name) {
            await setDoc(doc(db, "users", user.uid), {
                name: name || user.displayName,
                email: user.email,
                uid: user.uid,
                createdAt: serverTimestamp()
            }, { merge: true });
            window.location.href = "index.html";
        }

        // Social Handlers
        document.getElementById('btnGoogle').onclick = async () => {
            const result = await signInWithPopup(auth, new GoogleAuthProvider());
            await saveUser(result.user);
        };

        // Email Signup
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(res.user, { displayName: name });
                await saveUser(res.user, name);
                Swal.fire('Success!', 'Account created successfully', 'success');
            } catch (err) {
                alert(err.message);
            }
        };
    </script>
</body>
</html>
