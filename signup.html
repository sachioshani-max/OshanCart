<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OshanCart Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #121212;
            --btn-border: #2c2c2c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #ff4757;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* --- Manus Style Animated Background --- */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 71, 87, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: moveGlow 15s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-20%, -20%); }
            100% { transform: translate(20%, 20%); }
        }

        .container {
            width: 100%; max-width: 400px; padding: 25px;
            text-align: center; position: relative; z-index: 10;
        }

        .logo-section { margin-bottom: 30px; }
        .logo-img {
            width: 65px; height: 65px; margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255, 71, 87, 0.4));
        }
        h1 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }

        .social-list { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        
        .btn-social {
            display: flex; align-items: center; justify-content: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--btn-border);
            padding: 14px 24px; border-radius: 14px;
            color: white; font-weight: 500; font-size: 15px;
            cursor: pointer; transition: 0.3s ease;
        }

        .btn-social:hover { background: #1c1c1c; border-color: #444; transform: translateY(-2px); }
        .btn-social i { width: 30px; font-size: 20px; margin-right: 10px; }

        .divider {
            display: flex; align-items: center; color: #333;
            font-size: 11px; font-weight: 700; margin: 25px 0;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; margin: 0 15px; }

        .input-box input {
            width: 100%; background: #0f0f0f; border: 1px solid #222;
            padding: 15px; border-radius: 12px; color: white;
            box-sizing: border-box; font-size: 14px; margin-bottom: 12px;
        }

        .btn-main {
            width: 100%; background: #ffffff; color: #000000;
            border: none; padding: 16px; border-radius: 14px;
            font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s;
        }

        .footer { margin-top: 25px; font-size: 13px; color: var(--text-dim); }
        .footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bg-glow"></div>
    </div>

    <div class="container">
        <div class="logo-section">
            <img src="https://oshancart.github.io/logo.png" alt="OshanCart" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162499.png'">
            <h1>Create Account</h1>
        </div>

        <div class="social-list">
            <button class="btn-social" id="btnGoogle"><i class="fab fa-google"></i> Continue with Google</button>
            <button class="btn-social" id="btnFacebook"><i class="fab fa-facebook" style="color: #1877f2;"></i> Continue with Facebook</button>
        </div>

        <div class="divider">OR</div>

        <form id="signupForm">
            <div class="input-box">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <button class="btn-main">Create Account</button>
        </form>

        <div class="footer">
            Already have an account? <a href="login.html">Log In</a>
            <p style="margin-top: 15px; opacity: 0.5;">© 2026 OshanCart Global</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
            authDomain: "oshancart.firebaseapp.com",
            projectId: "oshancart",
            storageBucket: "oshancart.appspot.com",
            messagingSenderId: "686982543488",
            appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const handleAuth = async (provider) => {
            try {
                await signInWithPopup(auth, provider);
                Swal.fire({ icon: 'success', title: 'Welcome!', timer: 2000, showConfirmButton: false }).then(() => {
                    window.location.href = "index.html";
                });
            } catch (error) { Swal.fire({ icon: 'error', title: 'Failed', text: error.message }); }
        };

        document.getElementById('btnGoogle').onclick = () => handleAuth(new GoogleAuthProvider());
        document.getElementById('btnFacebook').onclick = () => handleAuth(new FacebookAuthProvider());
    </script>
</body>
</html>
