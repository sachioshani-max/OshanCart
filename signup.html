<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OshanCart Global</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #121212;
            --btn-border: #2c2c2c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #ff4757;
            --gold: #fbc02d;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        /* --- Manus Style Animated Background Glow --- */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        .bg-glow {
            position: absolute; width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(255, 71, 87, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(90px);
            animation: moveGlow 18s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-25%, -25%); }
            100% { transform: translate(25%, 25%); }
        }

        /* --- Main Container --- */
        .container {
            width: 100%; max-width: 420px; padding: 30px;
            text-align: center; position: relative; z-index: 10;
        }

        /* --- Points Badge (New) --- */
        .points-badge {
            display: inline-flex; align-items: center;
            background: rgba(251, 192, 45, 0.1);
            border: 1px solid var(--gold);
            padding: 8px 15px; border-radius: 20px;
            margin-bottom: 20px; color: var(--gold);
            font-size: 13px; font-weight: 700;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 192, 45, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(251, 192, 45, 0); }
            100% { transform: scale(1); }
        }

        /* --- Logo Section --- */
        .logo-section { margin-bottom: 25px; }
        .logo-img {
            width: 85px; height: 85px; margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255, 71, 87, 0.6));
            object-fit: contain;
        }
        h1 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -1px; }

        /* --- Social Login Buttons --- */
        .social-list { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        
        .btn-social {
            display: flex; align-items: center; justify-content: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--btn-border);
            padding: 14px 25px; border-radius: 16px;
            color: white; font-weight: 500; font-size: 15px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-social:hover {
            background: #1c1c1c; border-color: #555;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .btn-social i { width: 30px; font-size: 20px; margin-right: 12px; }

        /* --- Custom Divider --- */
        .divider {
            display: flex; align-items: center; color: #444;
            font-size: 11px; font-weight: 800; margin: 25px 0;
            text-transform: uppercase; letter-spacing: 3px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; margin: 0 20px; }

        /* --- Input Fields --- */
        .input-box { margin-bottom: 12px; }
        .input-box input {
            width: 100%; background: #0a0a0a; border: 1px solid #222;
            padding: 16px; border-radius: 14px; color: white;
            box-sizing: border-box; font-size: 15px; transition: 0.3s;
        }
        .input-box input:focus { border-color: var(--accent); outline: none; background: #000; }

        .btn-main {
            width: 100%; background: #ffffff; color: #000000;
            border: none; padding: 18px; border-radius: 16px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }
        .btn-main:hover { background: #e0e0e0; transform: scale(1.02); }

        /* --- Footer --- */
        .footer { margin-top: 30px; font-size: 14px; color: var(--text-dim); line-height: 1.6; }
        .footer a { color: var(--accent); text-decoration: none; font-weight: 700; transition: 0.2s; }
        .footer a:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bg-glow"></div>
    </div>

    <div class="container animate__animated animate__fadeIn">
        <div class="points-badge">
            <i class="fas fa-gift" style="margin-right: 8px;"></i> Join Now & Get 100 Points 🎁
        </div>

        <div class="logo-section">
            <img src="https://oshancart.github.io/logo.png" alt="OshanCart" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162499.png'">
            <h1>Create Account</h1>
        </div>

        <div class="social-list">
            <button class="btn-social" id="btnGoogle">
                <i class="fab fa-google" style="color: #ea4335;"></i> Continue with Google
            </button>
            <button class="btn-social" id="btnFacebook">
                <i class="fab fa-facebook" style="color: #1877f2;"></i> Continue with Facebook
            </button>
        </div>

        <div class="divider">OR</div>

        <form id="signupForm">
            <div class="input-box">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <button type="submit" class="btn-main">Create Account</button>
        </form>

        <div class="footer">
            Already have an account? <a href="login.html">Log In</a><br>
            <span style="font-size: 12px; opacity: 0.6; display: block; margin-top: 20px;">
                By continuing, you agree to our Terms and Privacy Policy.<br>
                © 2026 OshanCart Global
            </span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
            authDomain: "oshancart.firebaseapp.com",
            projectId: "oshancart",
            storageBucket: "oshancart.appspot.com",
            messagingSenderId: "686982543488",
            appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const notify = (icon, title, text, html = "") => {
            Swal.fire({
                icon: icon,
                title: title,
                text: text,
                html: html,
                showConfirmButton: false,
                timer: 3500,
                background: '#121212',
                color: '#fff',
                showClass: { popup: 'animate__animated animate__zoomIn' },
                hideClass: { popup: 'animate__animated animate__fadeOut' }
            });
        };

        const handleAuth = async (provider) => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    // NEW USER - Give 100 Points!
                    await setDoc(userRef, {
                        name: user.displayName || "OshanCart User",
                        email: user.email,
                        points: 100,
                        createdAt: new Date()
                    });

                    notify('success', '100 Points Earned! 🎁', '', 
                        `<div style="color:#fbc02d; font-weight:bold; font-size:20px; margin-top:10px;">
                            <i class="fas fa-medal"></i> Welcome Bonus Awarded!
                        </div>
                        <p style="color:#a0a0a0; font-size:14px;">Registration successful. Your VIP points are ready!</p>`
                    );
                } else {
                    notify('success', 'Welcome Back!', 'Logging you in to OshanCart...');
                }

                setTimeout(() => window.location.href = "profile.html", 3500);

            } catch (error) {
                notify('error', 'Auth Failed', error.message);
            }
        };

        document.getElementById('btnGoogle').onclick = () => handleAuth(new GoogleAuthProvider());
        document.getElementById('btnFacebook').onclick = () => handleAuth(new FacebookAuthProvider());

        document.getElementById('signupForm').onsubmit = (e) => {
            e.preventDefault();
            notify('info', 'Check Your Email', 'Verification link sent to your inbox.');
        };
    </script>
</body>
</html>
