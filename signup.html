<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OshanCart | Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --google-red: #db4437;
            --fb-blue: #4267B2;
            --tiktok-black: #010101;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .signup-card h2 { margin-bottom: 0.5rem; color: #1f2937; }
        .signup-card p { color: #6b7280; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1rem; text-align: left; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary-color); }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .divider {
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            color: #9ca3af;
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
            margin: 0 10px;
        }

        .social-btns { display: flex; flex-direction: column; gap: 10px; }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 500;
        }

        .footer-link { margin-top: 1.5rem; font-size: 0.85rem; }
        .footer-link a { color: var(--primary-color); text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-card">
    <h2>ගිණුමක් සාදන්න</h2>
    <p>OshanCart සමඟ එක්ව ආරක්ෂිතව සාප්පු සවාරි යන්න.</p>

    <div class="input-group">
        <input type="text" id="fullName" placeholder="සම්පූර්ණ නම">
    </div>
    <div class="input-group">
        <input type="email" id="email" placeholder="ඊමේල් ලිපිනය">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="මුරපදය">
    </div>
    <button class="btn-main" id="btnEmailSignup">ලියාපදිංචි වන්න</button>

    <div class="divider">නැතිනම් මේ හරහා</div>

    <div class="social-btns">
        <button class="social-btn" id="btnGoogle">
            <i class="fab fa-google" style="color:#db4437"></i> Google සමඟ එක්වන්න
        </button>
        <button class="social-btn" id="btnFacebook">
            <i class="fab fa-facebook" style="color:#4267B2"></i> Facebook සමඟ එක්වන්න
        </button>
    </div>

    <div class="footer-link">
        දැනටමත් ගිණුමක් තිබේද? <a href="login.html">ඇතුළු වන්න</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, FacebookAuthProvider, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
        authDomain: "oshancart.firebaseapp.com",
        projectId: "oshancart",
        storageBucket: "oshancart.firebasestorage.app",
        messagingSenderId: "686982543488",
        appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // දත්ත Firestore හි සුරැකීමේ Function එක
    async function saveUserToDB(user, name) {
        try {
            await setDoc(doc(db, "users", user.uid), {
                name: name || user.displayName,
                email: user.email,
                uid: user.uid,
                createdAt: serverTimestamp()
            }, { merge: true });
            window.location.href = "index.html";
        } catch (error) {
            console.error("Error saving user:", error);
        }
    }

    // Google Sign-In
    document.getElementById('btnGoogle').onclick = async () => {
        const provider = new GoogleAuthProvider();
        try {
            const result = await signInWithPopup(auth, provider);
            await saveUserToDB(result.user);
        } catch (error) {
            alert("Google Sign-in වැරදුනා: " + error.message);
        }
    };

    // Facebook Sign-In
    document.getElementById('btnFacebook').onclick = async () => {
        const provider = new FacebookAuthProvider();
        try {
            const result = await signInWithPopup(auth, provider);
            await saveUserToDB(result.user);
        } catch (error) {
            alert("Facebook Sign-in වැරදුනා: " + error.message);
        }
    };

    // Email/Password Sign-Up
    document.getElementById('btnEmailSignup').onclick = async () => {
        const name = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if(!name || !email || !password) return alert("කරුණාකර සියලු විස්තර පුරවන්න.");

        try {
            const result = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(result.user, { displayName: name });
            await saveUserToDB(result.user, name);
        } catch (error) {
            alert("ලියාපදිංචිය වැරදුනා: " + error.message);
        }
    };
</script>

</body>
</html>
