<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OshanCart Global</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #121212;
            --btn-border: #2c2c2c;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #ff4757;
            --gold: #fbc02d; /* Reward Color */
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        /* --- Animated Background Glow --- */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        .bg-glow {
            position: absolute; width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(255, 71, 87, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(90px);
            animation: moveGlow 18s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-25%, -25%); }
            100% { transform: translate(25%, 25%); }
        }

        /* --- Main Container --- */
        .container {
            width: 100%; max-width: 420px; padding: 30px;
            text-align: center; position: relative; z-index: 10;
        }

        /* --- Reward Badge (New) --- */
        .reward-badge {
            background: rgba(251, 192, 45, 0.15);
            border: 1px solid var(--gold);
            color: var(--gold);
            display: inline-block;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Logo Section --- */
        .logo-section { margin-bottom: 30px; }
        .logo-img {
            width: 80px; height: 80px; margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255, 71, 87, 0.6));
            object-fit: contain;
        }
        h1 { font-size: 30px; font-weight: 700; margin: 0; letter-spacing: -1px; }

        /* --- Social Login Buttons --- */
        .social-list { display: flex; flex-direction: column; gap: 14px; margin-top: 30px; }
        
        .btn-social {
            display: flex; align-items: center; justify-content: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--btn-border);
            padding: 15px 25px; border-radius: 16px;
            color: white; font-weight: 500; font-size: 15.5px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-social:hover {
            background: #1c1c1c; border-color: #555;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .btn-social i { width: 35px; font-size: 22px; margin-right: 12px; }

        /* --- Custom Divider --- */
        .divider {
            display: flex; align-items: center; color: #444;
            font-size: 11px; font-weight: 800; margin: 30px 0;
            text-transform: uppercase; letter-spacing: 3px;
        }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; margin: 0 20px; }

        /* --- Input Fields --- */
        .input-box { margin-bottom: 15px; }
        .input-box input {
            width: 100%; background: #0a0a0a; border: 1px solid #222;
            padding: 16px; border-radius: 14px; color: white;
            box-sizing: border-box; font-size: 15px; transition: 0.3s;
        }
        .input-box input:focus { border-color: var(--accent); outline: none; background: #000; }

        .btn-main {
            width: 100%; background: #ffffff; color: #000000;
            border: none; padding: 18px; border-radius: 16px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }
        .btn-main:hover { background: #e0e0e0; transform: scale(1.02); }

        /* --- Footer --- */
        .footer { margin-top: 35px; font-size: 14px; color: var(--text-dim); line-height: 1.6; }
        .footer a { color: var(--accent); text-decoration: none; font-weight: 700; transition: 0.2s; }
        .footer a:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bg-glow"></div>
    </div>

    <div class="container animate__animated animate__fadeIn">
        <div class="reward-badge animate__animated animate__pulse animate__infinite">
            🎁 Welcome Bonus: 100 Points for Joining
        </div>

        <div class="logo-section">
            <img src="https://oshancart.github.io/logo.png" alt="OshanCart" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162499.png'">
            <h1>Welcome to OshanCart</h1>
        </div>

        <div class="social-list">
            <button class="btn-social" id="btnFacebook">
                <i class="fab fa-facebook" style="color: #1877f2;"></i> Continue with Facebook
            </button>
            <button class="btn-social" id="btnGoogle">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <button class="btn-social" id="btnMicrosoft">
                <i class="fab fa-microsoft" style="color: #00a4ef;"></i> Continue with Microsoft
            </button>
            <button class="btn-social" id="btnApple">
                <i class="fab fa-apple"></i> Continue with Apple
            </button>
        </div>

        <div class="divider">OR</div>

        <form id="signupForm">
            <div class="input-box">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <button type="submit" class="btn-main">Continue with Email</button>
        </form>

        <div class="footer">
            Already have an account? <a href="login.html">Log In</a><br>
            <span style="font-size: 12px; opacity: 0.6; display: block; margin-top: 20px;">
                By continuing, you agree to our Terms and Privacy Policy.<br>
                © 2026 OshanCart Global
            </span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
            authDomain: "oshancart.firebaseapp.com",
            projectId: "oshancart",
            storageBucket: "oshancart.appspot.com",
            messagingSenderId: "686982543488",
            appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // SweetAlert Custom Notification
        const notify = (icon, title, text) => {
            return Swal.fire({
                icon: icon,
                title: title,
                text: text,
                showConfirmButton: false,
                timer: 2500,
                background: '#121212',
                color: '#fff',
                showClass: { popup: 'animate__animated animate__fadeInDown' },
                hideClass: { popup: 'animate__animated animate__fadeOutUp' }
            });
        };

        const handleAuth = async (provider) => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Check if user exists in Firestore
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    // NEW USER: Add 100 Points to Firestore
                    await setDoc(userRef, {
                        email: user.email,
                        points: 100,
                        createdAt: new Date()
                    });
                    
                    // Show Points Earning Alert
                    Swal.fire({
                        title: 'Congratulations! 🥳',
                        html: `<p style="color:#a0a0a0">Registration Successful! You've earned <b style="color:#fbc02d">100 Welcome Points</b>. ❤️‍🩹🏆</p>`,
                        icon: 'success',
                        background: '#121212',
                        color: '#fff',
                        confirmButtonColor: '#ff4757',
                        confirmButtonText: 'Let\'s Shop!'
                    }).then(() => {
                        window.location.href = "index.html";
                    });
                } else {
                    // EXISTING USER: Normal Login Notification
                    notify('success', 'Welcome Back!', '❤️‍🩹🏆 Login Successful. 🪅🥳');
                    setTimeout(() => window.location.href = "index.html", 2500);
                }
                
            } catch (error) {
                notify('error', 'Authentication Failed', error.message);
            }
        };

        document.getElementById('btnGoogle').onclick = () => handleAuth(new GoogleAuthProvider());
        document.getElementById('btnFacebook').onclick = () => handleAuth(new FacebookAuthProvider());
        
        // Placeholder for Microsoft/Apple
        document.getElementById('btnMicrosoft').onclick = () => notify('info', 'Coming Soon', 'Microsoft login is currently being integrated.');
        document.getElementById('btnApple').onclick = () => notify('info', 'Coming Soon', 'Apple login is currently being integrated.');

        document.getElementById('signupForm').onsubmit = (e) => {
            e.preventDefault();
            notify('info', 'Check Your Email', 'Verification link sent to your inbox.');
        };
    </script>
</body>
</html>
