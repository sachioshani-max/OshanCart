<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | OshanCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary-color: #232f3e;
            --accent-color: #febd69;
            --success-color: #27ae60;
            --bg-color: #f4f7f9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; color: #333;
        }

        /* Header */
        .top-bar {
            background: var(--primary-color);
            color: white; padding: 15px 0; text-align: center;
        }

        .container {
            max-width: 1100px; margin: 30px auto; padding: 0 20px;
            display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px;
        }

        .card {
            background: white; border-radius: 12px; padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        input, textarea {
            width: 100%; padding: 12px; border: 1.5px solid #d1d9e0;
            border-radius: 8px; box-sizing: border-box;
        }

        .btn-confirm {
            width: 100%; background: linear-gradient(180deg, #f7dfa5 0%, #f0c14b 100%);
            border: 1px solid #a88734; padding: 15px; border-radius: 8px;
            font-weight: 700; cursor: pointer;
        }

        /* පින්තූරය පෙන්වන කොටස */
        .product-box { display: flex; gap: 15px; background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .product-box img { width: 80px; height: 80px; object-fit: contain; border-radius: 8px; }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="top-bar"><h1>OSHAN CART</h1></div>

    <div class="container">
        <div class="left-side">
            <div class="card">
                <h2><i class="fas fa-truck-moving"></i> Shipping Details</h2>
                <form id="orderForm">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="cust-name" placeholder="Kamal Perera" required>
                    </div>
                    <div class="input-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" id="cust-phone" placeholder="07xxxxxxxx" required>
                    </div>
                    <div class="input-group">
                        <label>Address</label>
                        <textarea id="cust-address" rows="3" required></textarea>
                    </div>
                </form>
            </div>
        </div>

        <div class="right-side">
            <div class="card">
                <h2>Order Summary</h2>
                <div id="productDisplay">Loading...</div>
                <hr>
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2em; color:#B12704;">
                    <span>Total:</span>
                    <span id="grand-total">Rs. 0.00</span>
                </div>
                <button type="submit" form="orderForm" class="btn-confirm" id="confirmBtn" style="margin-top:20px;">CONFIRM ORDER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
            authDomain: "oshancart.firebaseapp.com",
            projectId: "oshancart",
            storageBucket: "oshancart.appspot.com",
            messagingSenderId: "686982543488",
            appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        emailjs.init("jfgAK0LaZ0w7RKAE8");

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let currentProduct = null;

        // භාණ්ඩය Load කිරීම
        async function fetchProduct() {
            if (!productId) return;
            const docRef = doc(db, "products", productId);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                currentProduct = snap.data();
                document.getElementById('productDisplay').innerHTML = `
                    <div class="product-box">
                        <img src="${currentProduct.image || currentProduct.img}" onerror="this.src='https://via.placeholder.com/150'">
                        <div>
                            <h4 style="margin:0;">${currentProduct.name || currentProduct.itemName}</h4>
                            <p style="color:#B12704; font-weight:bold;">Rs. ${currentProduct.price || currentProduct.itemPrice}</p>
                        </div>
                    </div>
                `;
                document.getElementById('grand-total').innerText = "Rs. " + (currentProduct.price || currentProduct.itemPrice);
            }
        }
        fetchProduct();

        // ඇණවුම Submit කිරීම
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // ලස්සන Loading එකක් පෙන්වීම
            Swal.fire({
                title: 'Processing...',
                text: 'ඔබේ ඇණවුම සකසමින් පවතී.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            const orderID = "OS" + Date.now().toString().slice(-6);

            try {
                // Firebase එකට දත්ත යැවීම
                await addDoc(collection(db, "orders"), {
                    orderID,
                    customerName: document.getElementById('cust-name').value,
                    phone: document.getElementById('cust-phone').value,
                    address: document.getElementById('cust-address').value,
                    productName: currentProduct.name || currentProduct.itemName,
                    status: "Pending",
                    timestamp: serverTimestamp()
                });

                // EmailJS Notification
                await emailjs.send('service_il15c1q', 'template_vmc0kvo', {
                    order_id: orderID,
                    cust_name: document.getElementById('cust-name').value,
                    product_name: currentProduct.name || currentProduct.itemName
                });

                // සාර්ථක වූ පසු ලස්සන Popup එකක් පෙන්වීම
                Swal.fire({
                    icon: 'success',
                    title: 'ඇණවුම සාර්ථකයි! 🎉',
                    text: `ඔබේ Order ID එක: ${orderID}`,
                    confirmButtonText: 'හරි',
                    confirmButtonColor: '#27ae60'
                }).then(() => {
                    window.location.href = "index.html";
                });

            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Error', text: error.message });
            }
        });
    </script>
</body>
</html>
