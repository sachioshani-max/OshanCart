<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | OshanCart Global</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #131921;
            --accent: #febd69;
            --success: #27ae60;
            --light-bg: #f7f8fa;
            --border-color: #d5d9d9;
            --point-gold: #ff6b1a;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); margin: 0; color: #111; }

        header { background: var(--primary); color: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 700; color: var(--accent); text-decoration: none; }

        .main-container { max-width: 1150px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1.8fr 1fr; gap: 40px; }
        .section-card { background: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; margin-bottom: 20px; }
        
        /* --- Points Section (The New Addition) --- */
        .points-box {
            background: #fff8f0; border: 1px dashed var(--point-gold); border-radius: 8px;
            padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .points-info i { color: var(--point-gold); margin-right: 10px; }
        .use-points-btn { background: var(--point-gold); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 700; cursor: pointer; }

        .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .discount-row { color: var(--success); font-weight: 600; display: none; }
        .total-row { font-size: 19px; font-weight: 700; color: #B12704; margin-top: 15px; padding-top: 15px; border-top: 2px solid #eee; }

        input, select { width: 100%; padding: 10px; border: 1px solid #888; border-radius: 4px; box-sizing: border-box; }
        .btn-place-order { width: 100%; background: #ffd814; border: 1px solid #fcd200; padding: 14px; border-radius: 25px; font-weight: 700; cursor: pointer; font-size: 16px; }

        @media (max-width: 850px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">OshanCart</a>
        <span>Secure Checkout</span>
    </header>

    <main class="main-container">
        
        <div class="checkout-steps">
            <div class="points-box">
                <div class="points-info">
                    <i class="fas fa-coins"></i>
                    <span>Your Balance: <b id="displayPoints">0</b> Points</span>
                </div>
                <button class="use-points-btn" id="applyPoints">Apply Discount</button>
            </div>

            <div class="section-card">
                <h3>1. Shipping Address</h3>
                <form id="orderForm">
                    <input type="text" id="full-name" placeholder="Full Name" required style="margin-bottom:10px;">
                    <input type="tel" id="phone" placeholder="WhatsApp Number" required style="margin-bottom:10px;">
                    <input type="text" id="address" placeholder="Full Street Address" required>
                </form>
            </div>

            <div class="section-card">
                <h3>2. Payment Method</h3>
                <p><i class="fas fa-hand-holding-usd"></i> <b>Cash on Delivery (COD)</b></p>
            </div>
        </div>

        <div class="summary-sidebar">
            <div class="section-card">
                <h3 style="margin-top:0;">Order Summary</h3>
                <div id="itemPreview"></div>

                <div class="price-details" style="border-top: 1px solid #eee; padding-top: 15px; margin-top:15px;">
                    <div class="price-row">
                        <span>Items:</span>
                        <span id="subtotal-val">LKR 0.00</span>
                    </div>
                    <div class="price-row discount-row" id="pointDiscountRow">
                        <span>Points Discount:</span>
                        <span id="discount-val">- LKR 0.00</span>
                    </div>
                    <div class="price-row total-row">
                        <span>Order Total:</span>
                        <span id="total-val">LKR 0.00</span>
                    </div>
                </div>

                <button type="submit" form="orderForm" class="btn-place-order">Place Your Order</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy430AP0t92QND_VdaoCkK0J23y2c5rkE",
            authDomain: "oshancart.firebaseapp.com",
            projectId: "oshancart",
            storageBucket: "oshancart.appspot.com",
            messagingSenderId: "686982543488",
            appId: "1:686982543488:web:d74a83a3f53dbae3754e65"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        emailjs.init("jfgAK0LaZ0w7RKAE8");

        let userPoints = 0;
        let originalPrice = 0;
        let currentTotal = 0;
        let discountUsed = 0;
        let currentUser = null;

        const pid = new URLSearchParams(window.location.search).get('id');

        // 1. Load User & Points
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userPoints = userDoc.data().points || 0;
                    document.getElementById('displayPoints').innerText = userPoints;
                }
                loadProduct();
            }
        });

        // 2. Load Product Details
        async function loadProduct() {
            if (!pid) return;
            const snap = await getDoc(doc(db, "products", pid));
            if (snap.exists()) {
                const data = snap.data();
                originalPrice = data.price || data.itemPrice;
                currentTotal = originalPrice;
                
                document.getElementById('itemPreview').innerHTML = `
                    <div style="display:flex; gap:10px;">
                        <img src="${data.image || data.img}" style="width:50px; height:50px; object-fit:contain;">
                        <div><p style="margin:0; font-size:14px; font-weight:600;">${data.name || data.itemName}</p></div>
                    </div>
                `;
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById('subtotal-val').innerText = `LKR ${originalPrice.toLocaleString()}`;
            document.getElementById('total-val').innerText = `LKR ${currentTotal.toLocaleString()}`;
        }

        // 3. Apply Points Logic (1 Point = LKR 1.00)
        document.getElementById('applyPoints').onclick = () => {
            if (userPoints <= 0) return;
            
            discountUsed = userPoints; // Use all points
            currentTotal = originalPrice - discountUsed;
            if (currentTotal < 0) currentTotal = 0;

            document.getElementById('pointDiscountRow').style.display = 'flex';
            document.getElementById('discount-val').innerText = `- LKR ${discountUsed.toLocaleString()}`;
            updateDisplay();
            
            Swal.fire({ icon: 'success', title: 'Points Applied!', text: `You saved LKR ${discountUsed}!`, timer: 2000 });
        };

        // 4. Submit Order
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            Swal.fire({ title: 'Finalizing Order...', didOpen: () => Swal.showLoading() });

            const oid = "OSG" + Math.floor(Math.random() * 1000000);

            try {
                // Update Firebase: Add Order & Deduct Points
                await addDoc(collection(db, "orders"), {
                    orderID: oid,
                    customer: document.getElementById('full-name').value,
                    total: currentTotal,
                    discount: discountUsed,
                    status: "Pending",
                    timestamp: serverTimestamp()
                });

                if (discountUsed > 0) {
                    await updateDoc(doc(db, "users", currentUser.uid), {
                        points: increment(-discountUsed)
                    });
                }

                Swal.fire({ icon: 'success', title: 'Order Placed!', text: `ID: ${oid}` }).then(() => location.href = "index.html");

            } catch (err) { Swal.fire({ icon: 'error', title: 'Error', text: err.message }); }
        };
    </script>
</body>
</html>
